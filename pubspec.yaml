name: "src_project"
description: "SRC Campus League App"
publish_to: 'none' # Prevent publishing

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/CUTImage.webp
    - assets/cut.webp
    - assets/silver.png
    - assets/CUTFS.png
    - assets/Rugby.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/cut.webp"